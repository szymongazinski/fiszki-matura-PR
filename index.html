<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiszki matura rozszerzona - matematyka</title>
    <link rel="stylesheet" href="styles.css?v=2026-05-03-2" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["\\[", "\\]"],
            ["$$", "$$"],
          ],
          processEscapes: true,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
        startup: {
          typeset: false,
          ready() {
            MathJax.startup.defaultReady();
            window.dispatchEvent(new Event("mathjax-ready"));
          },
        },
      };
    </script>
    <script defer src="app.js?v=2026-05-03-2"></script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/" aria-label="Strona główna fiszek">
        <span class="brand-mark">∑</span>
        <span>Fiszki maturalne PR</span>
      </a>
      <span class="topbar-note">Matematyka rozszerzona</span>
    </header>

    <main id="app" class="app" aria-live="polite"></main>
  </body>
</html>
